<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — KoperasiPOS</title>
    <link rel="stylesheet" href="/css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header">
                <h2>Dashboard</h2>
                <p>Ringkasan jualan dan prestasi koperasi hari ini</p>
            </div>
            <div class="page-body">
                <div class="stats-grid stagger" id="statsGrid"></div>
                <div class="charts-grid">
                    <div class="card">
                        <div class="card-header"><h3>📈 Trend Jualan (30 Hari)</h3></div>
                        <div class="card-body"><div class="chart-container"><canvas id="revenueChart"></canvas></div></div>
                    </div>
                    <div class="card">
                        <div class="card-header"><h3>⏰ Waktu Puncak Jualan</h3></div>
                        <div class="card-body"><div class="chart-container"><canvas id="hourlyChart"></canvas></div></div>
                    </div>
                    <div class="card">
                        <div class="card-header"><h3>💰 Kaedah Pembayaran</h3></div>
                        <div class="card-body"><div class="chart-container"><canvas id="paymentChart"></canvas></div></div>
                    </div>
                    <div class="card">
                        <div class="card-header"><h3>🏆 Produk Terlaris</h3></div>
                        <div class="card-body"><div class="chart-container"><canvas id="productsChart"></canvas></div></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/app.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
