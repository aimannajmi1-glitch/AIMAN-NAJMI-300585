<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Masuk — KoperasiPOS</title>
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }
        .login-page::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
            top: -100px; right: -100px;
            border-radius: 50%;
        }
        .login-page::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(168,85,247,0.06) 0%, transparent 70%);
            bottom: -50px; left: -50px;
            border-radius: 50%;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 1;
            animation: fadeIn 0.5s ease-out;
        }
        .login-brand {
            text-align: center;
            margin-bottom: 36px;
        }
        .login-brand .icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(99,102,241,0.3);
        }
        .login-brand h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-hover), #c084fc);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-brand p { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }
        .login-error {
            background: var(--danger-bg);
            border: 1px solid rgba(239,68,68,0.2);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .login-error.show { display: flex; align-items: center; gap: 8px; }
        .login-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-brand">
                <div class="icon">🏪</div>
                <h1>KoperasiPOS</h1>
                <p>Sistem Jualan Koperasi Sekolah</p>
            </div>

            <div class="login-error" id="loginError">
                <span>❌</span>
                <span id="loginErrorMsg"></span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Nama Pengguna</label>
                    <input type="text" class="form-input" id="username" placeholder="Masukkan nama pengguna" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Kata Laluan</label>
                    <input type="password" class="form-input" id="password" placeholder="Masukkan kata laluan" required>
                </div>
                <button type="submit" class="btn btn-primary login-btn" id="loginBtn">
                    Log Masuk
                </button>
            </form>

            <div class="login-footer">
                KoperasiPOS v1.0 — Koperasi Sekolah
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        // Check if already logged in
        (async () => {
            try {
                const data = await APP.api('/api/auth/me');
                if (data.user) {
                    window.location.href = data.user.role === 'admin' ? '/dashboard' : '/pos';
                }
            } catch {}
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');
            const errorMsg = document.getElementById('loginErrorMsg');

            btn.disabled = true;
            btn.textContent = 'Memproses...';
            errorDiv.classList.remove('show');

            try {
                const data = await APP.api('/api/auth/login', {
                    method: 'POST',
                    body: {
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    }
                });
                window.location.href = data.redirect;
            } catch (err) {
                errorMsg.textContent = err.message;
                errorDiv.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Log Masuk';
            }
        });
    </script>
</body>
</html>
