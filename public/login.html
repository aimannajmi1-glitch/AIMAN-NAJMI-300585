<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Masuk — N.A.D.I. Sistem Jualan Koperasi</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="login-page">
    <div class="login-card animate-fade">
        <div class="login-logo">
            <div class="logo-icon">🏪</div>
            <h1>N.A.D.I.</h1>
            <p>Sistem Jualan Koperasi Sekolah</p>
        </div>

        <div class="login-error" id="loginError"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">Nama Pengguna</label>
                <input type="text" id="username" class="form-input" placeholder="Masukkan nama pengguna..." autocomplete="username" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Kata Laluan</label>
                <input type="password" id="password" class="form-input" placeholder="Masukkan kata laluan..." autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" id="loginBtn" style="width:100%;margin-top:8px;">
                🔐 Log Masuk
            </button>
        </form>

        <p style="text-align:center;color:var(--text-muted);font-size:0.75rem;margin-top:24px;">
            N.A.D.I. v2.0 &mdash; Hak cipta terpelihara &copy; 2026
        </p>
    </div>
</div>

<script src="/js/app.js"></script>
<script>
(async () => {
    // If already logged in, redirect to pos
    try {
        const data = await APP.api('/api/auth/me');
        if (data.user) { window.location.href = '/pos'; return; }
    } catch {}

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.classList.remove('show');
        btn.disabled = true;
        btn.textContent = 'Sedang masuk...';

        try {
            const data = await APP.api('/api/auth/login', {
                method: 'POST',
                body: { username: document.getElementById('username').value.trim(), password: document.getElementById('password').value }
            });
            window.location.href = data.redirect || '/pos';
        } catch (err) {
            errorEl.textContent = err.message || 'Nama pengguna atau kata laluan tidak sah.';
            errorEl.classList.add('show');
            btn.disabled = false;
            btn.textContent = '🔐 Log Masuk';
        }
    });
})();
</script>
</body>
</html>
