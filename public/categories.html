<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori — N.A.D.I.</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header">
                <div class="page-header-actions">
                    <div><h2>🏷️ Pengurusan Kategori</h2><p>Urus kategori produk koperasi</p></div>
                    <button class="btn btn-primary" onclick="showForm()">+ Tambah Kategori</button>
                </div>
            </div>
            <div class="page-body">
                <div class="stats-grid" id="catGrid"></div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="formModal">
        <div class="modal">
            <div class="modal-header"><h3 id="formTitle">Tambah Kategori</h3><button class="btn-ghost" onclick="hideForm()">✕</button></div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-group"><label class="form-label">Nama Kategori *</label><input type="text" class="form-input" id="fname" required></div>
                <div class="form-group"><label class="form-label">Penerangan</label><input type="text" class="form-input" id="fdesc"></div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Warna</label><input type="color" id="fcolor" value="#3B82F6" style="width:100%;height:40px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-input);cursor:pointer;"></div>
                    <div class="form-group"><label class="form-label">Urutan</label><input type="number" class="form-input" id="fsort" value="0" min="0"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="hideForm()">Batal</button>
                <button class="btn btn-primary" onclick="saveCategory()">Simpan</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
    let categories = [];

    (async () => {
        const user = await APP.checkAuth('admin');
        if (!user) return;
        document.getElementById('sidebar').innerHTML = APP.renderSidebar(user);
        APP.initSidebar('categories');
        APP.initProtectedNav();
        APP.initInactivityTimer();
        await APP.enforceShiftGate();
        await loadCategories();
    })();

    async function loadCategories() {
        categories = await APP.api('/api/categories');
        renderCategories();
    }

    function renderCategories() {
        document.getElementById('catGrid').innerHTML = categories.map(c => `
            <div class="stat-card" style="--stat-color:${c.color_code};cursor:pointer;" onclick="editCategory(${c.id})">
                <div style="display:flex;justify-content:space-between;align-items:start;">
                    <div class="stat-icon" style="background:${c.color_code}22;color:${c.color_code};font-size:1.5rem;">🏷️</div>
                    <div class="btn-group">
                        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();toggleCategory(${c.id})" title="${c.is_active ? 'Nyahaktif' : 'Aktifkan'}">
                            ${c.is_active ? '🚫' : '✅'}
                        </button>
                    </div>
                </div>
                <div class="stat-value" style="font-size:1.3rem;margin-top:12px;">${c.name}</div>
                <div class="stat-label">${c.description || 'Tiada penerangan'}</div>
                <div style="margin-top:8px;">${c.is_active ? '<span class="badge badge-success">Aktif</span>' : '<span class="badge badge-danger">Tidak Aktif</span>'}</div>
            </div>
        `).join('') || '<div class="empty-state"><div class="empty-icon">🏷️</div><h3>Tiada kategori</h3><p>Tambah kategori pertama anda</p></div>';
    }

    function showForm(cat = null) {
        document.getElementById('formTitle').textContent = cat ? 'Kemaskini Kategori' : 'Tambah Kategori';
        document.getElementById('editId').value = cat ? cat.id : '';
        document.getElementById('fname').value = cat ? cat.name : '';
        document.getElementById('fdesc').value = cat ? cat.description || '' : '';
        document.getElementById('fcolor').value = cat ? cat.color_code : '#3B82F6';
        document.getElementById('fsort').value = cat ? cat.sort_order : 0;
        document.getElementById('formModal').classList.add('active');
    }
    function hideForm() { document.getElementById('formModal').classList.remove('active'); }

    async function editCategory(id) {
        const cat = await APP.api(`/api/categories/${id}`);
        showForm(cat);
    }

    async function saveCategory() {
        const id = document.getElementById('editId').value;
        const body = {
            name: document.getElementById('fname').value,
            description: document.getElementById('fdesc').value,
            color_code: document.getElementById('fcolor').value,
            sort_order: parseInt(document.getElementById('fsort').value) || 0
        };
        try {
            if (id) await APP.api(`/api/categories/${id}`, { method: 'PUT', body });
            else await APP.api('/api/categories', { method: 'POST', body });
            hideForm(); await loadCategories();
            APP.toast(id ? 'Kategori dikemaskini' : 'Kategori ditambah', 'success');
        } catch (err) { APP.toast(err.message, 'error'); }
    }

    async function toggleCategory(id) {
        try { await APP.api(`/api/categories/${id}/toggle`, { method: 'PATCH' }); await loadCategories(); }
        catch (err) { APP.toast(err.message, 'error'); }
    }
    </script>
</body>
</html>
