<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analitik — N.A.D.I.</title>
    <link rel="stylesheet" href="/css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header">
                <div class="page-header-actions">
                    <div><h2>📈 Analitik Jualan</h2><p>Wawasan visual berdasarkan data jualan</p></div>
                    <div class="btn-group">
                        <input type="date" class="form-input" id="dateFrom" style="width:auto;">
                        <span style="color:var(--text-muted);align-self:center;">hingga</span>
                        <input type="date" class="form-input" id="dateTo" style="width:auto;">
                        <button class="btn btn-primary" onclick="loadAll()">Tapis</button>
                        <button class="btn btn-outline" onclick="resetDates()">Reset</button>
                    </div>
                </div>
            </div>
            <div class="page-body">
                <div class="stats-grid stagger" id="statsGrid"></div>

                <div class="charts-grid">
                    <div class="card">
                        <div class="card-header"><h3>⏰ Waktu Puncak Jualan</h3><p style="font-size:0.75rem;color:var(--text-muted)">Merah = waktu rehat</p></div>
                        <div class="card-body"><div class="chart-container"><canvas id="hourlyChart"></canvas></div></div>
                    </div>
                    <div class="card">
                        <div class="card-header"><h3>💰 Kaedah Pembayaran</h3></div>
                        <div class="card-body"><div class="chart-container"><canvas id="paymentChart"></canvas></div></div>
                    </div>
                    <div class="card">
                        <div class="card-header"><h3>📈 Trend Hasil Harian</h3></div>
                        <div class="card-body"><div class="chart-container"><canvas id="dailyChart"></canvas></div></div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h3>🏆 Produk Terlaris</h3>
                            <div class="filter-tabs" style="display:inline-flex;">
                                <button class="filter-tab active" data-sort="revenue" onclick="loadProducts('revenue',this)">Hasil</button>
                                <button class="filter-tab" data-sort="quantity" onclick="loadProducts('quantity',this)">Kuantiti</button>
                            </div>
                        </div>
                        <div class="card-body"><div class="chart-container"><canvas id="productsChart"></canvas></div></div>
                    </div>
                    <div class="card">
                        <div class="card-header"><h3>🏷️ Jualan Mengikut Kategori</h3></div>
                        <div class="card-body"><div class="chart-container"><canvas id="categoryChart"></canvas></div></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/app.js"></script>
    <script>
    let charts = {};

    (async () => {
        const user = await APP.checkAuth('admin');
        if (!user) return;
        document.getElementById('sidebar').innerHTML = APP.renderSidebar(user);
        APP.initSidebar('analytics');
        APP.initProtectedNav();
        APP.initInactivityTimer();
        await APP.enforceShiftGate();

        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = '#2a3452';
        Chart.defaults.font.family = "'Inter', sans-serif";

        const now = new Date();
        const thirtyAgo = new Date(now);
        thirtyAgo.setDate(thirtyAgo.getDate() - 30);
        document.getElementById('dateFrom').value = thirtyAgo.toISOString().split('T')[0];
        document.getElementById('dateTo').value = now.toISOString().split('T')[0];

        await loadAll();
    })();

    function getDateParams() {
        const from = document.getElementById('dateFrom').value;
        const to = document.getElementById('dateTo').value;
        return from && to ? `from=${from}&to=${to}` : '';
    }

    function resetDates() {
        const now = new Date();
        const thirtyAgo = new Date(now); thirtyAgo.setDate(thirtyAgo.getDate() - 30);
        document.getElementById('dateFrom').value = thirtyAgo.toISOString().split('T')[0];
        document.getElementById('dateTo').value = now.toISOString().split('T')[0];
        loadAll();
    }

    async function loadAll() {
        const dp = getDateParams();
        await Promise.all([loadSummary(dp), loadHourly(dp), loadPayments(dp), loadDaily(), loadProducts('revenue'), loadCategories(dp)]);
    }

    async function loadSummary(dp) {
        const s = await APP.api(`/api/analytics/summary?${dp}`);
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card" style="--stat-color:var(--success)"><div class="stat-icon" style="background:var(--success-bg);color:var(--success)">💰</div><div class="stat-value">${APP.formatRM(s.totalSales)}</div><div class="stat-label">Jumlah Hasil</div></div>
            <div class="stat-card" style="--stat-color:var(--info)"><div class="stat-icon" style="background:var(--info-bg);color:var(--info)">🧾</div><div class="stat-value">${s.totalTransactions}</div><div class="stat-label">Jumlah Transaksi</div></div>
            <div class="stat-card" style="--stat-color:var(--cash-color)"><div class="stat-icon" style="background:var(--success-bg);color:var(--cash-color)">💵</div><div class="stat-value">${APP.formatRM(s.cashTotal)}</div><div class="stat-label">Tunai</div></div>
            <div class="stat-card" style="--stat-color:var(--qr-color)"><div class="stat-icon" style="background:rgba(139,92,246,0.1);color:var(--qr-color)">📱</div><div class="stat-value">${APP.formatRM(s.qrTotal)}</div><div class="stat-label">QR Pay</div></div>
        `;
    }

    async function loadHourly(dp) {
        const hourly = await APP.api(`/api/analytics/hourly?${dp}`);
        const school = hourly.filter(h => h.hour >= 7 && h.hour <= 15);
        if (charts.hourly) charts.hourly.destroy();
        charts.hourly = new Chart(document.getElementById('hourlyChart'), {
            type: 'bar', data: {
                labels: school.map(h => h.label),
                datasets: [{ label: 'Transaksi', data: school.map(h => h.transactions),
                    backgroundColor: school.map(h => (h.hour===10||h.hour===12||h.hour===13) ? 'rgba(239,68,68,0.7)' : 'rgba(99,102,241,0.5)'),
                    borderRadius: 6, borderSkipped: false }]
            }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#1e293b' } }, x: { grid: { display: false } } } }
        });
    }

    async function loadPayments(dp) {
        const payments = await APP.api(`/api/analytics/payments?${dp}`);
        const cash = payments.find(p => p.payment_method === 'cash') || { total_amount: 0 };
        const qr = payments.find(p => p.payment_method === 'qr_pay') || { total_amount: 0 };
        if (charts.payment) charts.payment.destroy();
        charts.payment = new Chart(document.getElementById('paymentChart'), {
            type: 'doughnut', data: {
                labels: ['Tunai', 'QR Pay'],
                datasets: [{ data: [cash.total_amount, qr.total_amount], backgroundColor: ['#10b981', '#8b5cf6'], borderColor: '#1a2035', borderWidth: 3 }]
            }, options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true } } } }
        });
    }

    async function loadDaily() {
        const daily = await APP.api('/api/analytics/daily?days=30');
        if (charts.daily) charts.daily.destroy();
        charts.daily = new Chart(document.getElementById('dailyChart'), {
            type: 'line', data: {
                labels: daily.map(d => { const dt = new Date(d.sale_date); return `${dt.getDate()}/${dt.getMonth()+1}`; }),
                datasets: [
                    { label: 'Jumlah (RM)', data: daily.map(d => d.revenue), borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,0.1)', fill: true, tension: 0.4, pointRadius: 2, borderWidth: 2 },
                    { label: 'Tunai (RM)', data: daily.map(d => d.cash_revenue), borderColor: '#10b981', borderDash: [5,5], tension: 0.4, pointRadius: 0, borderWidth: 1.5 },
                    { label: 'QR (RM)', data: daily.map(d => d.qr_revenue), borderColor: '#8b5cf6', borderDash: [5,5], tension: 0.4, pointRadius: 0, borderWidth: 1.5 }
                ]
            }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { usePointStyle: true } } }, scales: { y: { beginAtZero: true, grid: { color: '#1e293b' } }, x: { grid: { display: false } } } }
        });
    }

    async function loadProducts(sort = 'revenue', btnEl = null) {
        if (btnEl) { document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active')); btnEl.classList.add('active'); }
        const dp = getDateParams();
        const products = await APP.api(`/api/analytics/products?limit=10&sort=${sort}&${dp}`);
        if (charts.products) charts.products.destroy();
        charts.products = new Chart(document.getElementById('productsChart'), {
            type: 'bar', data: {
                labels: products.map(p => p.product_name),
                datasets: [{ label: sort === 'revenue' ? 'Hasil (RM)' : 'Kuantiti', data: products.map(p => sort === 'revenue' ? p.total_revenue : p.total_qty),
                    backgroundColor: 'rgba(99,102,241,0.6)', borderRadius: 6, borderSkipped: false }]
            }, options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, grid: { color: '#1e293b' } }, y: { grid: { display: false } } } }
        });
    }

    async function loadCategories(dp) {
        const cats = await APP.api(`/api/analytics/categories?${dp || getDateParams()}`);
        if (charts.category) charts.category.destroy();
        charts.category = new Chart(document.getElementById('categoryChart'), {
            type: 'pie', data: {
                labels: cats.map(c => c.category_name),
                datasets: [{ data: cats.map(c => c.total_revenue), backgroundColor: cats.map(c => c.color_code || '#6366f1'), borderColor: '#1a2035', borderWidth: 2 }]
            }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { padding: 12, usePointStyle: true } } } }
        });
    }
    </script>
</body>
</html>
